# Render deployment configuration
services:
  - type: web
    name: sentiscope-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://sentiscope.vercel.app
      - key: USE_MOCK_DATA
        value: "false"
      - key: FLASK_ENV
        value: production
